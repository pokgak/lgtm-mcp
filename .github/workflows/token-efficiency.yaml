name: Token Efficiency Evaluation

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'src/lgtm_mcp/tools/**'

jobs:
  evaluate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Clone OpenTelemetry Demo
        run: git clone --depth 1 https://github.com/open-telemetry/opentelemetry-demo.git /tmp/otel-demo

      - name: Start Astronomy Shop (minimal)
        working-directory: /tmp/otel-demo
        run: |
          docker compose -f docker-compose.minimal.yml up -d
          echo "Waiting for services to start and generate load..."
          sleep 180

      - name: Verify backends are ready
        run: |
          echo "Checking Loki..."
          curl -sf http://localhost:3100/ready || echo "Loki not ready"
          echo "Checking Prometheus..."
          curl -sf http://localhost:9090/-/ready || echo "Prometheus not ready"
          echo "Checking Tempo..."
          curl -sf http://localhost:3200/ready || echo "Tempo not ready"

      - name: Run token efficiency evaluation
        run: uv run python tests/eval/runner.py

      - name: Add report to summary
        if: always()
        run: |
          if [ -f tests/eval/report.md ]; then
            cat tests/eval/report.md >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: evaluation-report
          path: tests/eval/report.md

      - name: Cleanup
        if: always()
        working-directory: /tmp/otel-demo
        run: docker compose -f docker-compose.minimal.yml down -v
